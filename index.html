<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Modern Calculator</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #141e30, #243b55);
    font-family: Arial, sans-serif;
}

.calculator {
    width: 320px;
    padding: 20px;
    border-radius: 25px;
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(15px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

.display {
    color: #fff;
    font-size: 2.5em;
    text-align: right;
    padding: 20px 10px;
    margin-bottom: 20px;
    border-radius: 15px;
    background: rgba(0,0,0,0.4);
    box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
    overflow-x: auto;
}

.buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(5, 1fr);
    gap: 15px;
}

button {
    height: 65px;
    border-radius: 50%;
    border: none;
    font-size: 1.3em;
    cursor: pointer;
    transition: 0.2s;
}

/* Number buttons */
.number {
    background: rgba(255,255,255,0.08);
    color: white;
}

/* Function buttons */
.function {
    background: rgba(255,255,255,0.15);
    color: #00e5ff;
}

/* Operators */
.operator {
    background: linear-gradient(135deg, #3d5afe, #00c6ff);
    color: white;
}

/* Equal */
.equal {
    background: linear-gradient(135deg, #00c853, #64dd17);
    color: white;
}

/* Hover effect */
button:hover {
    transform: scale(1.08);
    box-shadow: 0 5px 15px rgba(0,0,0,0.5);
}

/* Click effect */
button:active {
    transform: scale(0.95);
}
</style>
</head>

<body>

<div class="calculator">
    <div class="display" id="display">0</div>

    <div class="buttons">
        <!-- Row 1 -->
        <button class="function" onclick="clearDisplay()">AC</button>
        <button class="function" onclick="backspace()">⌫</button>
        <button class="function" onclick="toggleSign()">+/-</button>
        <button class="operator" onclick="append('/')">÷</button>

        <!-- Row 2 -->
        <button class="number" onclick="append('7')">7</button>
        <button class="number" onclick="append('8')">8</button>
        <button class="number" onclick="append('9')">9</button>
        <button class="operator" onclick="append('*')">×</button>

        <!-- Row 3 -->
        <button class="number" onclick="append('4')">4</button>
        <button class="number" onclick="append('5')">5</button>
        <button class="number" onclick="append('6')">6</button>
        <button class="operator" onclick="append('-')">−</button>

        <!-- Row 4 -->
        <button class="number" onclick="append('1')">1</button>
        <button class="number" onclick="append('2')">2</button>
        <button class="number" onclick="append('3')">3</button>
        <button class="operator" onclick="append('+')">+</button>

        <!-- Row 5 -->
        <button class="number" onclick="append('%')">%</button>
        <button class="number" onclick="append('0')">0</button>
        <button class="number" onclick="append('.')">.</button>
        <button class="equal" onclick="calculate()">=</button>
    </div>
</div>

<script>
let display = document.getElementById("display");

function append(value) {
    if (display.innerText === "0") {
        display.innerText = value;
    } else {
        display.innerText += value;
    }
}

function clearDisplay() {
    display.innerText = "0";
}

function backspace() {
    display.innerText = display.innerText.slice(0, -1);
    if (display.innerText === "") display.innerText = "0";
}

function toggleSign() {
    if (display.innerText !== "0") {
        if (display.innerText.startsWith("-")) {
            display.innerText = display.innerText.slice(1);
        } else {
            display.innerText = "-" + display.innerText;
        }
    }
}

function calculate() {
    try {
        display.innerText = eval(display.innerText);
    } catch {
        display.innerText = "Error";
    }
}
</script>

</body>
</html>
